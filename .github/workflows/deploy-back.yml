name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'gw-home-api/**'
      - 'gw-home-share/**'
      - 'gw-home-infra-db/**'
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: '백엔드 수동 배포 확인'
        required: true
        default: 'yes'
      deploy_note:
        description: '배포 메모'
        required: false
        default: ''

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.confirm_deploy == 'yes'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 배포 요청 정보 출력
        run: echo "수동 배포 메모=${{ github.event.inputs.deploy_note }}"

      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 백엔드 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/backend/Dockerfile
          push: true
          tags: ghcr.io/glassworld/gw-home-backend:latest

      - name: 서버에 백엔드 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script: |
            cd "${{ secrets.OCI_PROJECT_PATH }}"
            git pull origin main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull backend
            docker compose up -d backend
