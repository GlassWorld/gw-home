name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'gw-home-api/**'
      - 'gw-home-share/**'
      - 'gw-home-infra-db/**'
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: '백엔드 수동 배포 확인'
        required: true
        default: 'yes'
      deploy_note:
        description: '배포 메모'
        required: false
        default: ''

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.confirm_deploy == 'yes'
    runs-on: ubuntu-latest

    steps:
      - name: 배포 요청 정보 출력
        run: echo "수동 배포 메모=${{ github.event.inputs.deploy_note }}"

      - name: 서버에 백엔드 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script: |
            cd "${{ secrets.OCI_PROJECT_PATH }}"
            git pull origin main
            docker compose up -d --build backend
