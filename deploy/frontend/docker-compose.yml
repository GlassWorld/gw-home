services:
  frontend:
    image: ghcr.io/glassworld/gw-home-frontend:latest
    container_name: gw-fe-app
    restart: always
    environment:
      NUXT_PUBLIC_API_BASE: /api
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: gw-fe-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - frontend
    networks:
      - app-network

  certbot:
    image: certbot/certbot:latest
    container_name: gw-fe-certbot
    profiles:
      - manual
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

networks:
  app-network:
    driver: bridge
