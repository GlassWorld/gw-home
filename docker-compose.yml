services:

  backend:
    image: ghcr.io/glassworld/gw-home-backend:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/glassworld/gw-home-frontend:latest
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: /api
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
