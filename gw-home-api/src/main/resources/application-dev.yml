spring:
  datasource:
    url: jdbc:postgresql://168.107.12.96:5432/gw?currentSchema=home
    username: ${DB_USERNAME:gw}
    password: ${DB_PASSWORD:UQTiDCsYmD5oHYDL}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

file:
  upload:
    path: /tmp/gw-home/uploads
    base-url: ${FILE_BASE_URL:http://localhost/files}
    max-size: 10MB
    allowed-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/zip
      - application/x-zip-compressed

openai:
  api-key: ${OPENAI_API_KEY:}
  primary-model: ${OPENAI_PRIMARY_MODEL:gpt-5.4-mini}
  fallback-model: ${OPENAI_FALLBACK_MODEL:gpt-5-mini}
